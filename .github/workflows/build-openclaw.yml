name: Build and Push OpenClaw Multi-Arch

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: latest)"
        required: false
        default: "latest"
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.openclaw"

env:
  IMAGE: qiguangyang/openclaw

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile.openclaw
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ inputs.tag || 'latest' }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create manifest list
        run: |
          TAG="${{ inputs.tag || 'latest' }}"
          docker buildx imagetools create \
            -t ${IMAGE}:${TAG} \
            ${IMAGE}:${TAG}-amd64 \
            ${IMAGE}:${TAG}-arm64
          if [ "${TAG}" != "latest" ]; then
            docker buildx imagetools create \
              -t ${IMAGE}:latest \
              ${IMAGE}:${TAG}-amd64 \
              ${IMAGE}:${TAG}-arm64
          fi

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${IMAGE}:${{ inputs.tag || 'latest' }}
